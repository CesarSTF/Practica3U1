<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Distribuidos - Práctica 3</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        h1 { color: #00d2ff; }
        .botones { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
            justify-content: center;
        }
        button { 
            background-color: #1e1e1e; 
            color: #00d2ff; 
            border: 1px solid #00d2ff; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover { background-color: #00d2ff; color: #121212; }
        button:disabled { background-color: #333; color: #777; border-color: #555; cursor: not-allowed; }
        .consola-container {
            width: 100%;
            max-width: 800px;
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        pre { 
            margin: 0; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace;
            height: 400px; 
            overflow-y: auto; 
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h1>Panel de Control</h1>
    
    <div class="botones">
        <button onclick="ejecutar('taquilla')" id="btn-taquilla">1. Taquilla</button>
        <button onclick="ejecutar('gimnasio')" id="btn-gimnasio">2. Gimnasio</button>
        <button onclick="ejecutar('vitrina')" id="btn-vitrina">3. Panadería</button>
        <button onclick="ejecutar('tablon')" id="btn-tablon">4. Tablón Notas</button>
        <button onclick="ejecutar('encuentro')" id="btn-encuentro">5. Barrera</button>
    </div>

    <div class="consola-container">
        <pre id="consola">Esperando instrucción del usuario...</pre>
    </div>

    <script>
        let streamActual = null;

        function ejecutar(ejercicio) {
            const consola = document.getElementById('consola');
            const botones = document.querySelectorAll('button');
            
            if (streamActual) {
                streamActual.close();
            }

            botones.forEach(b => b.disabled = true);
            consola.textContent = `Ejecutando ${ejercicio}...\n`;

            streamActual = new EventSource('/api/ejecutar/' + ejercicio);

            streamActual.onmessage = function(evento) {
                consola.textContent += evento.data + '\n';
                consola.scrollTop = consola.scrollHeight;
            };

            streamActual.onerror = function() {
                streamActual.close();
                botones.forEach(b => b.disabled = false);
                consola.textContent += "\n--- Ejecución Finalizada ---";
                consola.scrollTop = consola.scrollHeight;
            };
        }
    </script>
</body>
</html>
